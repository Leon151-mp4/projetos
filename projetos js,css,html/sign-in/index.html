<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-in</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box">
      <h1>sign-in</h1>

      <div class="name">
        <label for="User-Name" id="">Name</label>
        <input type="text" id="name" />
      </div>
      <div class="Email">
        <label for="User-Email" id="Email1">Email</label>
        <input type="email" id="Email2" />
      </div>
      <div class="password">
        <label for="User-Password" id="Password">Password</label>
        <input type="password" id="password1" />
      </div>
      <div class="repeat">
        <label for="Repeat-Password" id="repeat">Repeat the Password</label>
        <input type="password" id="pasword2"/>
      </div>
      <div class="button">
        <button id="btn">Confirm</button>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
